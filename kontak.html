<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontak - Toko Buku Taqiee</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#1e3a5f; /* navy background */
    color:white;
}

/* CONTAINER */
.kontak-container{
    max-width:1000px;
    margin:60px auto;
    display:flex;
    gap:40px;
    flex-wrap:wrap;
}

/* CARD */
.card{
    background:#243f66; /* lebih soft dari background */
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    flex:1;
    min-width:300px;
    border:1px solid rgba(255,255,255,0.1);
}

/* JUDUL */
h2{
    margin-bottom:20px;
    color:#c7dcff;
}

/* INFO */
.info p{
    margin:10px 0;
    color:#e5edff;
}

/* FORM */
form{
    display:flex;
    flex-direction:column;
}

input, textarea{
    margin-bottom:15px;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.2);
    background:#1b3554;
    color:white;
    font-size:14px;
}

input::placeholder,
textarea::placeholder{
    color:#bcd3ff;
}

input:focus, textarea:focus{
    outline:none;
    border:1px solid #6ea8ff;
    box-shadow:0 0 10px rgba(110,168,255,0.4);
}

/* BUTTON */
button{
    background:linear-gradient(135deg,#4f8cff,#2563eb);
    color:white;
    padding:12px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(79,140,255,0.6);
}
</style>


<body>

<div class="kontak-container">

    <!-- INFO TOKO -->
    <div class="card info">
        <h2>📍 Alamat Toko</h2>
        <p><strong>Toko Buku Taqiee</strong></p>
        <p>Jl. Pendidikan No. 123</p>
        <p>Kapasari, Surabaya</p>
        <p>📞 0812-3456-7890</p>
        <p>📧 tokobukutaaqiee@gmail.com</p>
    </div>

    <!-- FORM KONTAK -->
    <div class="card">
        <h2>📝 Kirim Pesan</h2>
        <form>
            <input type="text" placeholder="Nama Anda" required>
            <input type="email" placeholder="Email Anda" required>
            <textarea rows="5" placeholder="Tulis pesan anda..." required></textarea>
            <button type="submit">Kirim Pesan</button>
        </form>
    </div>

</div>

</body>

</html>
